<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <!-- Nordic Zen Palette Gradient -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b58d6e" /> <!-- Warm Oak -->
      <stop offset="100%" stop-color="#dcd3c1" /> <!-- Warm Sand -->
    </linearGradient>
    <!-- Soft Glow filter to make details stand out on dark browser tabs -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Headband -->
  <path d="M4 16 C 4 8 10 3 16 3 C 22 3 28 8 28 16" stroke="url(#primary-grad)" stroke-width="2.8" stroke-linecap="round" />
  
  <!-- Left Earcup -->
  <rect x="2" y="13" width="4" height="10" rx="1.8" fill="url(#primary-grad)" />
  
  <!-- Right Earcup -->
  <rect x="26" y="13" width="4" height="10" rx="1.8" fill="url(#primary-grad)" />
  
  <!-- Subtle Earcup connectors -->
  <path d="M4 23 L 4 24.5 M 28 23 L 28 24.5" stroke="url(#primary-grad)" stroke-width="1.2" stroke-opacity="0.4" />

  <!-- Cozy Crescent Moon (Center Left) representing Lofi / Night / Zen -->
  <path d="M17 9.5 C 11.64 9.5 7.3 13.84 7.3 19.2 C 7.3 24.56 11.64 28.9 17 28.9 C 13.5 28.9 11 25.5 11 19.2 C 11 12.9 13.5 9.5 17 9.5 Z" fill="url(#primary-grad)" filter="url(#glow)" />

  <!-- Soundwaves radiating from the moon (Center Right) representing Reverb echos -->
  <path d="M19.5 15.5 A 4 4 0 0 1 19.5 22.9" stroke="#dcd3c1" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.8" />
  <path d="M22.5 12.5 A 7.5 7.5 0 0 1 22.5 25.9" stroke="#b58d6e" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5" />
</svg>
